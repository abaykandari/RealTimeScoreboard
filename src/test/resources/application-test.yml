spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: scoreboard-test-group
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Use a separate Redis DB for tests (if not using Testcontainers)
  data:
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    topics:
      score-events: leaderboard-score-events
      score-events-partitions: 1
      score-events-replicas: 1
  jwt:
    secret: test-secret-key-that-is-at-least-32-chars-long
    expiration-hours: 1
  leaderboard:
    stream-interval-ms: 60000  # don't spam in tests
    default-top-n: 10

logging:
  level:
    com.scoreboard: DEBUG
