server:
  port: 8080
  # Trust ngrok's forwarded headers so Spring sees the real origin/protocol.
  # Without this, Spring sees origin as "http://localhost" instead of the
  # actual request origin, causing CORS to miscalculate allowed origins.
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 20          # default is 200 — absurd on free tier, each thread costs ~256KB stack
      min-spare: 4
    connection-timeout: 20s

# ─── gRPC ────────────────────────────────────────────────────────────────────
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}   # reads env var, defaults to 9090 locally
    security:
      enabled: false

# ─── Kafka ───────────────────────────────────────────────────────────────────
spring:
  main:
    lazy-initialization: true   # beans created on first use, not all at startup
                                # cuts the startup memory spike significantly

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
      ssl.endpoint.identification.algorithm: ""
      ssl.truststore.type: PEM
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                  # strongest durability guarantee
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        sasl.jaas.config: ${KAFKA_SASL_JAAS:}
        ssl.endpoint.identification.algorithm: ""
        ssl.truststore.type: PEM
        ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    consumer:
      group-id: scoreboard-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false  # manual ack for at-least-once processing
      properties:
        spring.json.trusted.packages: "com.scoreboard.model"
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        sasl.jaas.config: ${KAFKA_SASL_JAAS:}
        ssl.endpoint.identification.algorithm: ""
        ssl.truststore.type: PEM
        ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 2             # 3 consumer threads per partition group

  # ─── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 2
          min-idle: 1
          max-wait: 2000ms

  # ─── Security ───────────────────────────────────────────────────────────────
  security:
    user:
      name: admin
      password: admin

# ─── App config ──────────────────────────────────────────────────────────────
app:
  kafka:
    topics:
      score-events: leaderboard-score-events
      score-events-partitions: 6
      score-events-replicas: 1
  redis:
    keys:
      global-leaderboard: "leaderboard:global"
      game-leaderboard-prefix: "leaderboard:game:"
      user-profile-prefix: "user:profile:"
    ttl:
      user-profile-seconds: 86400       # 24 hours
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
    expiration-hours: 24
  leaderboard:
    stream-interval-ms: 2000           # push updates every 2 seconds
    default-top-n: 10

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.scoreboard: DEBUG
    org.springframework.kafka: INFO
    io.grpc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
