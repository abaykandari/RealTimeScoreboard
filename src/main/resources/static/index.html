<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTEROID COMMAND</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020408;color:#d0eeff;font-family:'Share Tech Mono',monospace;
  min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,245,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,.025) 1px,transparent 1px);
  background-size:52px 52px;animation:g 20s linear infinite;pointer-events:none}
@keyframes g{to{background-position:52px 52px}}
.box{position:relative;z-index:1;text-align:center;padding:20px}
.title{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:10px;
  color:#00f5ff;text-shadow:0 0 30px rgba(0,245,255,.5);line-height:1}
.sub{font-size:12px;color:#2a4a6a;letter-spacing:4px;margin-top:8px}
.cards{display:flex;gap:16px;margin:40px 0;justify-content:center;flex-wrap:wrap}
.card{background:#0b1120;border:1px solid #0d2040;border-radius:4px;padding:28px 32px;
  width:200px;text-decoration:none;color:inherit;transition:all .2s;display:block}
.card:hover{border-color:#00f5ff;box-shadow:0 0 20px rgba(0,245,255,.15);transform:translateY(-3px)}
.card-icon{font-size:36px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#00f5ff}
.card-desc{font-size:10px;color:#2a4a6a;letter-spacing:1px;margin-top:6px;line-height:1.7}
.badge{display:inline-block;padding:4px 10px;border:1px solid #0d2040;border-radius:2px;
  font-size:10px;color:#2a4a6a;letter-spacing:2px;margin-top:6px}
.stack{margin-top:32px;font-size:10px;color:#1a3050;letter-spacing:2px}
.stack span{color:#00f5ff}
</style>
</head>
<body>
<div class="box">
  <div class="title">ASTEROID<br>COMMAND</div>
  <div class="sub">REAL-TIME MULTIPLAYER LEADERBOARD SYSTEM</div>

  <div class="cards">
    <a class="card" href="/game.html">
      <div class="card-icon">🚀</div>
      <div class="card-title">PLAY GAME</div>
      <div class="card-desc">Asteroid shooter with live score updates across all players</div>
    </a>
    <a class="card" href="/actuator/health" target="_blank">
      <div class="card-icon">💚</div>
      <div class="card-title">HEALTH</div>
      <div class="card-desc">Spring Boot actuator — live system status</div>
    </a>
    <a class="card" href="/actuator/metrics" target="_blank">
      <div class="card-icon">📊</div>
      <div class="card-title">METRICS</div>
      <div class="card-desc">Prometheus metrics endpoint for monitoring</div>
    </a>
  </div>

  <div class="stack">
    POWERED BY &nbsp;
    <span>SPRING BOOT</span> ·
    <span>KAFKA</span> ·
    <span>REDIS</span> ·
    <span>gRPC</span> ·
    <span>WEBSOCKET</span>
  </div>
</div>
</body>
</html>
